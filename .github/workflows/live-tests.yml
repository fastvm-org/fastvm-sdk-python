name: Live tests

# Hits the real FastVM API. Runs alongside the offline CI on every PR and
# push to main, plus on-demand and nightly. Requires the ``FASTVM_API_KEY``
# repo secret; tests auto-skip when it's missing (fork PRs, etc.).
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      base_url:
        description: FastVM API base URL (optional override)
        required: false
        default: ''
  schedule:
    - cron: '0 8 * * *' # 08:00 UTC daily

permissions:
  contents: read

# Per-ref serialization: a second push to a PR branch cancels the in-flight
# run so we only burn VM quota on the latest commit. Main/scheduled/manual
# runs don't cancel — each deserves to complete.
concurrency:
  group: fastvm-live-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  live:
    name: live
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.10.2'

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run live tests
        env:
          FASTVM_API_KEY: ${{ secrets.FASTVM_API_KEY }}
          FASTVM_BASE_URL: ${{ github.event.inputs.base_url }}
        run: uv run pytest tests/lib/live -v
