name: Live tests

# Hits the real FastVM API. Trigger matrix matches the offline CI so every
# push + PR + merge runs the live suite. Requires the ``FASTVM_API_KEY`` repo
# secret; tests auto-skip when it's missing (fork PRs get the skip path).
on:
  push:
    branches:
      - '**'
      - '!integrated/**'
      - '!stl-preview-head/**'
      - '!stl-preview-base/**'
      - '!generated'
      - '!codegen/**'
      - 'codegen/stl/**'
  pull_request:
    branches-ignore:
      - 'stl-preview-head/**'
      - 'stl-preview-base/**'
  workflow_dispatch:
    inputs:
      base_url:
        description: FastVM API base URL (optional override)
        required: false
        default: ''
  schedule:
    - cron: '0 8 * * *' # 08:00 UTC daily

permissions:
  contents: read

# Serialize per-ref; new pushes to a PR branch cancel in-flight runs.
concurrency:
  group: fastvm-live-tests-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/main' }}

jobs:
  live:
    name: live
    timeout-minutes: 30
    runs-on: ubuntu-latest
    # Skip the phantom pull_request job on non-fork PRs — push already covers
    # the same commit. Same anti-double-run pattern as ci.yml.
    if: (github.event_name == 'push' || github.event.pull_request.head.repo.fork) && (github.event_name != 'push' || github.event.head_commit.message != 'codegen metadata')
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: '0.10.2'

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run live tests
        env:
          FASTVM_API_KEY: ${{ secrets.FASTVM_API_KEY }}
          # Fall back to the production API when no dispatch override is given.
          FASTVM_BASE_URL: ${{ github.event.inputs.base_url || 'https://api.fastvm.org' }}
        run: uv run pytest tests/lib/live -v
